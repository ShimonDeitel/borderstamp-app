name: Border Stamp
options:
  bundleIdPrefix: com.shimondeitel.borderstamp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Border Stamp:
    type: application
    platform: iOS
    sources:
      - path: Border Stamp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.borderstamp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Border Stamp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Border StampTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Border StampTests
      - path: Border Stamp.storekit
    dependencies:
      - target: Border Stamp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.borderstamp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Border StampUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Border StampUITests
    dependencies:
      - target: Border Stamp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.borderstamp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Border Stamp:
    build:
      targets:
        Border Stamp: all
        Border StampTests: [test]
        Border StampUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Border Stamp.storekit
    test:
      config: Debug
      storeKitConfiguration: Border Stamp.storekit
      targets:
        - Border StampTests
        - Border StampUITests
    archive:
      config: Release
